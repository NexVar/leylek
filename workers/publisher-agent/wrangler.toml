name = "leylek-publisher-agent"
main = "src/index.ts"
compatibility_date = "2026-05-19"
compatibility_flags = ["nodejs_compat"]

[observability]
enabled = true

[vars]
META_API_VERSION = "v21.0"
LEYLEK_AD_PLATFORM = "sim"

[[d1_databases]]
binding = "DB"
database_name = "leylek-prod"
database_id = "c20b810d-f5a9-464d-9fa9-8a33101948f7"
migrations_dir = "../../packages/db/migrations"

[[kv_namespaces]]
binding = "KV"
id = "e9c37be505844e1dbdb0b83b8311ed17"

# Secrets:
#   META_APP_ID
#   META_APP_SECRET
#   GOOGLE_ADS_DEVELOPER_TOKEN
#   GOOGLE_OAUTH_CLIENT_ID
#   GOOGLE_OAUTH_CLIENT_SECRET
#   AES_KEY_BASE  (for decrypting connected_account tokens)
#   GOOGLE_ADS_LOGIN_CUSTOMER_ID  (real mode only; 10-digit MCC)
