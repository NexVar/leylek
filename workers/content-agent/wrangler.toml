name = "leylek-content-agent"
main = "src/index.ts"
compatibility_date = "2026-05-19"
compatibility_flags = ["nodejs_compat"]

[observability]
enabled = true

# Workers AI — used for image generation via Flux Schnell. Gemini 2.5
# Flash Image free-tier quota is 0 on this project, so we run image gen
# on Cloudflare's own model server (free tier 10K neurons/day, well over
# the demo cadence). Text variants still go through Gemini.
[ai]
binding = "AI"

# R2 bucket for AI-generated ad creatives. content-agent calls Workers AI
# Flux Schnell per variant, then writes the returned PNG here under
# `ad-<id>.png`. Gateway proxies reads at `/api/creatives/:key`.
[[r2_buckets]]
binding = "CREATIVES"
bucket_name = "leylek-creatives"

# Secrets — set via `wrangler secret put <NAME> --name leylek-content-agent`:
#   GEMINI_API_KEY
