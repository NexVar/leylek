name = "leylek-content-agent"
main = "src/index.ts"
compatibility_date = "2026-05-19"
compatibility_flags = ["nodejs_compat"]

[observability]
enabled = true

# R2 bucket (optional) — AI-generated ad creatives. Uncomment once the CI
# deploy token has R2 permissions:
#   [[r2_buckets]]
#   binding = "CREATIVES"
#   bucket_name = "leylek-creatives"
#
# Secrets — set via `wrangler secret put <NAME> --name leylek-content-agent`:
#   GEMINI_API_KEY
