name = "leylek-optimizer-agent"
main = "src/index.ts"
compatibility_date = "2026-05-19"
compatibility_flags = ["nodejs_compat"]

[observability]
enabled = true

# Demo runtime defaults to simulator client in publisher-agent; flip to "real"
# in production (PRD §10) once Google Ads dev_token Standard access lands.
[vars]
LEYLEK_AD_PLATFORM = "sim"

# Durable Object — per-campaign agent state
[[durable_objects.bindings]]
name = "CAMPAIGN_AGENT"
class_name = "CampaignAgent"

[[migrations]]
tag = "v1"
new_sqlite_classes = ["CampaignAgent"]

# Cron — every 6 hours in production
[triggers]
crons = ["0 */6 * * *"]

[[d1_databases]]
binding = "DB"
database_name = "leylek-prod"
database_id = "c20b810d-f5a9-464d-9fa9-8a33101948f7"

[[kv_namespaces]]
binding = "KV"
id = "e9c37be505844e1dbdb0b83b8311ed17"

# Service binding to publisher-agent for atomic action delegation
[[services]]
binding = "PUBLISHER_AGENT"
service = "leylek-publisher-agent"

# Secrets:
#   GEMINI_API_KEY
