name = "leylek-gateway"
main = "src/index.ts"
compatibility_date = "2026-05-19"
compatibility_flags = ["nodejs_compat"]

[observability]
enabled = true

[vars]
# Single-origin setup: frontend served by Pages, /api/* routed to this worker
# via a Cloudflare zone route attached out-of-band. Same origin means
# SameSite=Lax cookies work and there's no cross-site fetch ceremony.
APP_URL = "https://leylek.nexvar.io"
GATEWAY_URL = "https://leylek.nexvar.io"
JWT_ISSUER = "leylek-gateway"
LEYLEK_AD_PLATFORM = "sim"

# Route binding lives in Cloudflare directly (zone nexvar.io, pattern
# `leylek.nexvar.io/api/*` → script `leylek-gateway`). Keeping it out of
# wrangler.toml so `wrangler deploy` doesn't need `Workers Routes:Edit`
# on the deploy token. Manage via API or dashboard.

[[d1_databases]]
binding = "DB"
database_name = "leylek-prod"
database_id = "c20b810d-f5a9-464d-9fa9-8a33101948f7"
migrations_dir = "../../packages/db/migrations"

[[kv_namespaces]]
binding = "KV"
id = "e9c37be505844e1dbdb0b83b8311ed17"

# Service bindings — each agent Worker is reachable type-safely from here.
[[services]]
binding = "CONTENT_AGENT"
service = "leylek-content-agent"

[[services]]
binding = "OPTIMIZER_AGENT"
service = "leylek-optimizer-agent"

[[services]]
binding = "PUBLISHER_AGENT"
service = "leylek-publisher-agent"

[[services]]
binding = "ANALYTICS_WORKER"
service = "leylek-analytics-worker"

# Secrets (set via `wrangler secret put <NAME> --name leylek-gateway`):
#   GOOGLE_OAUTH_CLIENT_ID
#   GOOGLE_OAUTH_CLIENT_SECRET
#   JWT_SECRET
#   AES_KEY_BASE
#   RESEND_API_KEY
#   META_APP_ID
#   META_APP_SECRET
