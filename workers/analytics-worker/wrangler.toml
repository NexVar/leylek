name = "leylek-analytics-worker"
main = "src/index.ts"
compatibility_date = "2026-05-19"
compatibility_flags = ["nodejs_compat"]

[observability]
enabled = true

[vars]
META_API_VERSION = "v21.0"

# Cron — every 15 minutes in production
[triggers]
crons = ["*/15 * * * *"]

[[d1_databases]]
binding = "DB"
database_name = "leylek-prod"
database_id = "c20b810d-f5a9-464d-9fa9-8a33101948f7"

# Secrets:
#   META_APP_ID
#   META_APP_SECRET
#   GOOGLE_ADS_DEVELOPER_TOKEN
#   GOOGLE_OAUTH_CLIENT_ID
#   GOOGLE_OAUTH_CLIENT_SECRET
#   AES_KEY_BASE
