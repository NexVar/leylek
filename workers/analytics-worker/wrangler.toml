name = "leylek-analytics-worker"
main = "src/index.ts"
compatibility_date = "2026-05-19"
compatibility_flags = ["nodejs_compat"]

[observability]
enabled = true

[vars]
META_API_VERSION = "v21.0"

# Ad-platform base URLs — see workers/publisher-agent/wrangler.toml for the
# same vars and the prod-flip recipe.
GOOGLE_ADS_BASE_URL = "https://leylek-google-ads-mock.batuhanbayazitt.workers.dev"
GOOGLE_ADS_OAUTH_URL = "https://leylek-google-ads-mock.batuhanbayazitt.workers.dev"
META_ADS_BASE_URL = "https://leylek-meta-ads-mock.batuhanbayazitt.workers.dev"

# Cron — every 15 minutes in production
[triggers]
crons = ["*/15 * * * *"]

[[d1_databases]]
binding = "DB"
database_name = "leylek-prod"
database_id = "c20b810d-f5a9-464d-9fa9-8a33101948f7"

# KV — sim metric snapshots live here (seed-demo-data.ts writes them);
# in real mode the worker bypasses KV and calls the platform directly.
[[kv_namespaces]]
binding = "KV"
id = "e9c37be505844e1dbdb0b83b8311ed17"

# Secrets:
#   META_APP_ID
#   META_APP_SECRET
#   GOOGLE_ADS_DEVELOPER_TOKEN
#   GOOGLE_OAUTH_CLIENT_ID
#   GOOGLE_OAUTH_CLIENT_SECRET
#   AES_KEY_BASE
